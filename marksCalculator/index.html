<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body class="min-h-screen bg-cover bg-center" style="background-image:url('./public/images/hero.jpg')">

<div class="min-h-screen bg-black/70 flex items-center justify-center p-4">

<div class="bg-white w-full max-w-4xl rounded-2xl shadow-xl p-6 md:p-10 space-y-6">

<h1 class="text-2xl md:text-3xl font-bold text-center text-brown-700 flex justify-center items-center gap-2">
<i class="ri-graduation-cap-fill"></i> Student Result System
</h1>

<div class="grid md:grid-cols-2 gap-6">

<div class="space-y-4">

<label class="font-semibold">Number of Subjects</label>
<input id="subjectCount" type="number" min="1"
class="w-full p-3 border rounded-lg">

<p id="countError" class="text-red-500 text-sm"></p>

<button id="generateBtn"
class="w-full bg-gray-700 text-white p-3 rounded-lg hover:bg-brown-900">
Generate Subjects
</button>

<form id="marksForm" class="space-y-4"></form>

<p id="formError" class="text-red-500 text-sm"></p>

<button id="calculateBtn"
class="hidden w-full bg-black text-white p-3 rounded-lg hover:bg-gray-900">
Calculate Result
</button>

</div>

<div class="flex flex-col justify-center items-center">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
class="w-40 md:w-56">
<p class="text-center text-gray-600 mt-4">Marks Range: 0 - 100</p>
</div>

</div>

</div>

</div>

<!-- RESULT BOARD -->

<div id="resultSection"
class="hidden bg-gradient-to-br from-brown-900 to-black text-white p-6 md:p-12 border-t-8 border-brown-400">

<h2 class="text-2xl md:text-3xl font-bold text-center mb-6">
Result Billboard
</h2>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center mb-8">

<div class="bg-white/10 p-5 rounded-xl border border-white/30">
<p>Total</p>
<p id="totalMarks" class="text-2xl font-bold"></p>
</div>

<div class="bg-white/10 p-5 rounded-xl border border-white/30">
<p>Percentage</p>
<p id="percentage" class="text-2xl font-bold"></p>
</div>

<div class="bg-white/10 p-5 rounded-xl border border-white/30">
<p>Grade</p>
<p id="grade" class="text-2xl font-bold"></p>
</div>

<div class="bg-white/10 p-5 rounded-xl border border-white/30">
<p>Status</p>
<p id="status" class="text-2xl font-bold"></p>
</div>

</div>

<div class="overflow-x-auto border border-white/30 rounded-lg">
<table class="w-full">
<thead class="bg-white/20">
<tr>
<th class="p-3 text-left">Subject</th>
<th class="p-3 text-left">Marks</th>
</tr>
</thead>
<tbody id="subjectTable"></tbody>
</table>
</div>

<div class="flex flex-col md:flex-row justify-center gap-4 mt-8">

<button id="recalculateBtn"
class="bg-yellow-400 text-black px-8 py-3 rounded-lg font-semibold">
Recalculate
</button>

<button id="resetBtn"
class="bg-white text-black px-8 py-3 rounded-lg font-semibold">
Reset
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
